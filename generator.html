<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Generator | Pokédex Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/main.css">
  <link rel="stylesheet" href="./src/styles/generator.css">
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <div class="header-inner">
      <div class="logo">
        <svg class="pokeball-icon" viewBox="0 0 100 100" width="36" height="36">
          <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="4"/>
          <path d="M2,50 H98" stroke="currentColor" stroke-width="4"/>
          <circle cx="50" cy="50" r="16" fill="none" stroke="currentColor" stroke-width="4"/>
          <circle cx="50" cy="50" r="8" fill="currentColor"/>
        </svg>
        <h1>Pokédex</h1>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Pokédex</a>
        <a href="generator.html" class="nav-link active">Generator</a>
      </nav>
      <div class="header-spacer"></div>
      <button id="filter-toggle" class="filter-toggle-btn" aria-label="Toggle Filters">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M6 12h12M8 18h8"/>
        </svg>
        <span class="filter-badge" id="filter-badge" hidden>0</span>
      </button>
    </div>
  </header>

  <!-- Main Layout -->
  <main id="app-main">
    <!-- Generator Section -->
    <section class="generator-section" id="generator-section">
      <div class="generator-container">
        <div class="generator-header">
          <h2>Random Pokémon Generator</h2>
          <p>Generate a random Pokémon or a full team based on your filters.</p>
        </div>

        <div class="generator-filter-box">
          <!-- Row 1 -->
          <div class="filter-row">
            <div class="filter-item">
              <span>Generate</span>
              <select id="team-size-select" class="gen-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6" selected>6</option>
              </select>
              <span>Pokémon</span>
            </div>

            <div class="filter-item">
              <select id="region-select" class="gen-select">
                <option value="">All Regions</option>
                <option value="generation-i">Gen I (Kanto)</option>
                <option value="generation-ii">Gen II (Johto)</option>
                <option value="generation-iii">Gen III (Hoenn)</option>
                <option value="generation-iv">Gen IV (Sinnoh)</option>
                <option value="generation-v">Gen V (Unova)</option>
                <option value="generation-vi">Gen VI (Kalos)</option>
                <option value="generation-vii">Gen VII (Alola)</option>
                <option value="generation-viii">Gen VIII (Galar)</option>
                <option value="generation-ix">Gen IX (Paldea)</option>
              </select>
            </div>

            <div class="filter-item">
              <select id="type-select" class="gen-select">
                <option value="">All Types</option>
              </select>
            </div>
          </div>

          <!-- Row 2 -->
          <div class="filter-row">
            <div class="filter-item">
              <select id="legendary-select" class="gen-select">
                <option value="">All Legendaries</option>
                <option value="legendary">Legendary Only</option>
                <option value="mythical">Mythical Only</option>
                <option value="neither">Non-Legendary</option>
              </select>
            </div>

            <div class="filter-item">
              <select id="stage-select" class="gen-select">
                <option value="">All Stages</option>
                <option value="basic">Basic (Unevolved)</option>
                <option value="stage-1">Stage 1</option>
                <option value="stage-2">Stage 2</option>
                <option value="no-evolution">No Evolution</option>
              </select>
            </div>

            <div class="filter-item">
              <select id="evolved-select" class="gen-select">
                <option value="">Fully Evolved or Not</option>
                <option value="final">Fully Evolved Only</option>
                <option value="not-final">Can Evolve Further</option>
              </select>
            </div>
          </div>

          <!-- Row 3 -->
          <div class="filter-row">
            <div class="filter-item">
              <select id="display-select" class="gen-select">
                <option value="both">Names and Images</option>
                <option value="name">Names Only</option>
                <option value="image">Images Only</option>
              </select>
            </div>

            <div class="filter-item checkbox-item">
              <label class="gen-checkbox">
                <input type="checkbox" id="natures-checkbox">
                <span class="cb-custom"></span>
                Natures
              </label>
            </div>

            <div class="filter-item checkbox-item">
              <label class="gen-checkbox">
                <input type="checkbox" id="genders-checkbox">
                <span class="cb-custom"></span>
                Genders
              </label>
            </div>

            <div class="filter-item">
              <select id="forms-select" class="gen-select">
                <option value="default">All Forms</option>
                <option value="shiny">Shiny Forms</option>
              </select>
            </div>

            <div class="filter-item">
              <button id="generate-btn" class="generate-action-btn">Generate</button>
            </div>
          </div>
        </div>


        <div id="results-area" class="results-area">
          <div class="placeholder-content">
            <div class="placeholder-icon">?</div>
            <p>Click "Generate" to see the magic!</p>
          </div>
        </div>
      </div>
    </section>
  </main>


  <!-- Detail Modal -->
  <div id="detail-modal" class="modal-overlay" hidden>
    <button id="modal-close" class="modal-close" aria-label="Close modal">&times;</button>
    <div class="modal-content">
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="./src/generator.js"></script>
</body>
</html>
