<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex Settings — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css">
  <style>
    body {
      padding-top: var(--header-height);
      overflow-y: hidden; /* Main container will handle scrolling */
    }

    .admin-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - var(--header-height));
    }

    /* Sidebar Tabs */
    .settings-sidebar {
      background: rgba(15, 15, 26, 0.5);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border-color);
      padding: 30px 20px;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 24px;
      padding-left: 10px;
    }

    .gen-tab {
      width: 100%;
      padding: 14px 20px;
      margin-bottom: 8px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .gen-tab:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
    }

    .gen-tab.active {
      background: rgba(108, 92, 231, 0.1);
      border-color: rgba(108, 92, 231, 0.3);
      color: var(--accent);
    }

    .gen-tab .tab-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .gen-tab.active .tab-indicator {
      opacity: 1;
    }

    /* Main Content Area */
    .settings-content {
      padding: 60px;
      overflow-y: auto;
      background: var(--bg-primary);
    }

    .admin-hero {
      margin-bottom: 50px;
    }

    .admin-hero h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #6c5ce7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .admin-hero p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 600px;
      line-height: 1.6;
    }

    .admin-section {
      max-width: 900px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .section-icon {
      width: 48px;
      height: 48px;
      background: rgba(108, 92, 231, 0.1);
      color: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .section-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .game-exclusion-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 30px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      margin-bottom: 16px;
      transition: var(--transition);
    }

    .game-exclusion-row:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--border-hover);
    }

    .game-info label {
      font-weight: 700;
      color: var(--text-primary);
      display: block;
      margin-bottom: 6px;
      font-size: 1.05rem;
    }

    .game-id-badge {
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--text-muted);
      font-family: monospace;
    }

    .exclusion-textarea {
      width: 100%;
      min-height: 70px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 14px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
      transition: all 0.2s;
    }

    .exclusion-textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .admin-actions {
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid var(--border-color);
    }

    .btn-premium {
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid transparent;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-save {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn-save:hover {
      background: #7d6dfa;
      transform: translateY(-2px);
    }

    .btn-reset {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border-color);
      color: var(--text-secondary);
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    #toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 1000;
      background: rgba(15, 15, 26, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid var(--accent);
      color: #fff;
      padding: 16px 28px;
      border-radius: 16px;
      font-weight: 600;
      box-shadow: var(--shadow-modal);
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #toast.show { transform: translateX(0); }
    #toast .toast-icon { color: #06D6A0; }

    @media (max-width: 900px) {
      .admin-layout { grid-template-columns: 1fr; }
      .settings-sidebar { display: none; } /* Could add mobile toggle later */
    }
  </style>
</head>
<body class="admin-page">
  <header id="app-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/" class="logo">
          <svg class="pokeball-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="M22 12H2M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
          </svg>
          <h1>PokéPedia</h1>
        </a>
      </div>
      <div class="header-center"></div>
      <div class="header-right">
        <nav class="header-nav">
          <a href="/" class="nav-link">Home</a>
          <a href="/tracker.html" class="nav-link">Tracker</a>
        </nav>
      </div>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="settings-sidebar">
      <div class="sidebar-title">Games</div>
      <div id="tabs-container">
        <!-- Tabs injected here -->
      </div>
    </aside>

    <main class="settings-content">
      <div class="admin-hero">
        <h1 id="content-title">Admin Control</h1>
        <p>Manage Pokémon exclusions for each specific game. Select a game from the sidebar to edit its settings.</p>
      </div>
      
      <section class="admin-section">
        <div class="section-header">
          <div class="section-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </div>
          <h2 id="section-title">Game Exclusions</h2>
        </div>
        
        <div id="exclusions-manager">
          <div style="text-align: center; color: var(--text-muted); padding: 60px;">
            Initializing...
          </div>
        </div>

        <div class="admin-actions">
          <button id="reset-btn" class="btn-premium btn-reset">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
            </svg>
            Reset All
          </button>
          <button id="save-all-btn" class="btn-premium btn-save">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
            </svg>
            Save Changes
          </button>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast">
    <span class="toast-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </span>
    <span id="toast-message">Changes saved successfully!</span>
  </div>

  <script type="module" src="/src/js/settings.js"></script>
</body>
</html>
