<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex Settings — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css">
  <style>
    .admin-page {
      background: #f8fafc;
      min-height: 100vh;
      color: #1e293b;
      font-family: 'Outfit', sans-serif;
    }
    .admin-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 2px solid #e2e8f0;
    }
    .admin-header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #ef4444; /* Pokedex Red */
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #64748b;
      font-weight: 500;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: #ef4444;
    }
    .admin-section {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .admin-section h2 {
      margin-bottom: 10px;
      font-size: 1.25rem;
      font-weight: 700;
    }
    .admin-section p {
      color: #64748b;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .game-exclusion-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 20px;
      padding: 20px 0;
      border-top: 1px solid #f1f5f9;
    }
    .game-info label {
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }
    .game-info span {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .exclusion-textarea {
      width: 100%;
      min-height: 60px;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      resize: vertical;
      transition: border-color 0.2s;
    }
    .exclusion-textarea:focus {
      outline: none;
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }
    .admin-actions {
      margin-top: 40px;
      display: flex;
      justify-content: flex-end;
      gap: 15px;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn-primary {
      background: #ef4444;
      color: white;
    }
    .btn-primary:hover {
      background: #dc2626;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }
    .btn-secondary:hover {
      background: #e2e8f0;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #10b981;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      transform: translateY(100px);
      transition: transform 0.3s ease;
    }
    .toast.show {
      transform: translateY(0);
    }
  </style>
</head>
<body class="admin-page">
  <div class="admin-container">
    <header class="admin-header">
      <h1>Admin Settings</h1>
      <a href="/" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to PokéPedia
      </a>
    </header>
    
    <section class="admin-section">
      <h2>Game Exclusions</h2>
      <p>Edit the exclusion lists for each game below. When finished, click <strong>"Save Changes"</strong>. The changes will be applied automatically to <code>src/js/gameExclusions.js</code>.</p>
      
      <div id="exclusions-manager">
        <!-- JS will populate this -->
        <div style="text-align: center; color: #94a3b8; padding: 40px;">Loading games...</div>
      </div>

      <div class="admin-actions">
        <button id="reset-btn" class="btn btn-secondary">Reset Changes</button>
        <button id="save-all-btn" class="btn btn-primary">Save All Changes</button>
      </div>
    </section>
  </div>

  <div id="toast" class="toast">Changes saved successfully!</div>

  <script type="module" src="/src/js/settings.js"></script>
</body>
</html>
